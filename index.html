<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tasters | Catálogo de Café Verde</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14532d">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cursor-pointer:hover .group-hover\:scale-105 { transform: scale(1.05); }
        .video-overlay { background: rgba(20, 83, 45, 0.85); }
        .img-protegida { pointer-events: none; user-select: none; -webkit-user-drag: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="cursor-pointer" onclick="volverCatalogo()">
                <h1 class="text-3xl font-extrabold tracking-tighter text-green-900">Super Tasters</h1>
                <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">Café de Origen</p>
            </div>
            <a href="https://wa.me/56975552708" target="_blank" class="text-sm font-semibold text-green-800 hover:text-green-600 transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                +569 75552708
            </a>
        </div>
    </nav>

    <div id="vista-principal">
        <section class="relative py-40 px-6 border-b-8 border-green-700 overflow-hidden flex items-center justify-center bg-green-900">
            <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover z-0 opacity-40">
                <source src="video.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 video-overlay z-10"></div>
            <div class="relative z-20 max-w-4xl mx-auto text-center text-white">
                <h2 class="text-5xl font-extrabold mb-6 leading-tight drop-shadow-xl tracking-tight">Expertos en Taza, Aliados en Origen</h2>
                <p class="text-xl text-green-100 font-light max-w-2xl mx-auto leading-relaxed">Suministramos café verde de especialidad con trazabilidad total y análisis técnico riguroso.</p>
            </div>
        </section>

        <main class="max-w-6xl mx-auto px-6 py-16">
            <div id="loading" class="flex flex-col items-center justify-center py-20 text-gray-400">
                <svg class="animate-spin h-10 w-10 text-green-800 mb-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-medium animate-pulse">Cargando catálogo técnico...</p>
            </div>
            <div id="catalogo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden"></div>
        </main>
    </div>

    <div id="vista-detalle" class="hidden bg-gray-50 min-h-screen pb-20">
        <div class="h-32 bg-green-900 relative">
             <button onclick="volverCatalogo()" class="absolute top-6 left-6 bg-white bg-opacity-20 hover:bg-opacity-40 text-white px-4 py-2 rounded-full backdrop-blur-sm transition flex items-center gap-2 font-medium text-sm border border-white border-opacity-30 z-20">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Volver al Catálogo
             </button>
        </div>

        <div class="max-w-6xl mx-auto px-6 -mt-10 relative z-20">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 relative" oncontextmenu="return false;">
                        <img id="detalle-img" src="" class="w-full h-96 object-cover rounded-xl img-protegida bg-gray-200 shadow-inner">
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="text-xl font-extrabold text-gray-900 border-b pb-2 mb-6 uppercase tracking-tighter">Evaluación Sensorial</h4>
                        <div id="contenedor-pildoras-sabor" class="flex flex-wrap gap-2 mb-8"></div>
                        <div class="relative w-full max-w-md mx-auto h-72">
                            <canvas id="radarChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-5 space-y-6">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                        
                        <div class="mb-6">
                            <div class="flex justify-between items-start mb-3">
                                <span id="detalle-categoria" class="text-[10px] font-extrabold px-3 py-1.5 rounded-full uppercase tracking-widest text-white"></span>
                                <span id="detalle-stock" class="text-sm font-bold px-3 py-1 rounded border"></span>
                            </div>
                            <h2 id="detalle-nombre" class="text-4xl font-extrabold text-gray-900 leading-tight mb-2 tracking-tighter"></h2>
                            <p id="detalle-origen-texto" class="text-green-700 font-medium text-sm"></p>
                        </div>

                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-6 space-y-4">
                            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Configurar Pedido</h4>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="setFormato('1kg')" id="btn-format-1kg" class="format-btn py-3 px-4 rounded-lg border-2 font-bold text-sm transition bg-white border-gray-200 text-gray-600">
                                    🛒 Formato 1kg
                                </button>
                                <button onclick="setFormato('Saco')" id="btn-format-saco" class="format-btn py-3 px-4 rounded-lg border-2 font-bold text-sm transition border-green-600 bg-green-50 text-green-900">
                                    📦 Formato Saco
                                </button>
                            </div>

                            <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-gray-200">
                                <span class="font-bold text-sm text-gray-700">Cantidad:</span>
                                <div class="flex items-center gap-3">
                                    <button onclick="changeQty(-1)" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 font-bold">-</button>
                                    <input type="number" id="input-qty" value="1" min="1" class="w-12 text-center font-bold bg-transparent outline-none" readonly>
                                    <button onclick="changeQty(1)" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 font-bold">+</button>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-3 mb-8">
                            <button id="btn-pago-fintoc" class="w-full bg-gray-900 text-white p-4 rounded-xl hover:bg-black transition flex justify-between items-center shadow-lg">
                                <div class="text-left leading-tight">
                                    <span class="block font-bold text-sm">Fintoc / Transfer</span>
                                    <span class="text-[10px] text-gray-400">Sin comisión</span>
                                </div>
                                <span class="text-xl font-black">$<span id="txt-precio-fintoc">0</span></span>
                            </button>

                            <button id="btn-pago-mp" class="w-full bg-[#009EE3] text-white p-4 rounded-xl hover:bg-[#0089C7] transition flex justify-between items-center shadow-lg">
                                <div class="text-left leading-tight">
                                    <span class="block font-bold text-sm">Mercado Pago</span>
                                    <span class="text-[10px] text-blue-100">+3.5% recargo tarjetas</span>
                                </div>
                                <span class="text-xl font-black">$<span id="txt-precio-mp">0</span></span>
                            </button>
                        </div>

                        <div class="bg-white border-t border-gray-100 pt-6">
                            <h4 class="text-sm font-bold text-gray-900 mb-4 uppercase tracking-widest">Ficha Técnica</h4>
                            <div id="detalle-ficha" class="space-y-2 text-xs text-gray-600"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzLrChkaUqiWMyDgYpzfHHjmwPcZJ2afiiXQEFbFZ_-2iE-6pV1m4CnVlIAUlKCVc1g/exec';
        let productosGlobal = []; 
        let radarInstancia = null;
        
        // Estado del pedido actual
        let currentProduct = null;
        let selectedFormat = 'Saco';
        let currentQty = 1;

        async function cargarCatalogo() {
            try {
                const respuesta = await fetch(API_URL);
                productosGlobal = await respuesta.json();
                document.getElementById('loading').classList.add('hidden');
                const grid = document.getElementById('catalogo-grid');
                grid.classList.remove('hidden');

                grid.innerHTML = productosGlobal.map((p, i) => {
                    const nro = parseInt(p.Stock);
                    const isAgotado = isNaN(nro) ? (p.Stock && p.Stock.toLowerCase() === 'agotado') : (nro <= 0);
                    return `
                        <div onclick="verDetalle(${i})" class="bg-white cursor-pointer rounded-2xl shadow-sm hover:shadow-xl transition-all border border-gray-200 overflow-hidden group">
                            <div class="h-52 relative overflow-hidden bg-gray-100">
                                <img src="${p.Imagen || 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7'}" class="w-full h-full object-cover transition transform group-hover:scale-105">
                                <div class="absolute top-4 left-4 bg-green-900 text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest">${p.Categoria || 'ORIGEN'}</div>
                                ${p.Puntaje ? `<div class="absolute bottom-4 right-4 bg-white/90 backdrop-blur px-2 py-1 rounded font-bold text-xs shadow-sm">SCA: ${p.Puntaje}</div>` : ''}
                            </div>
                            <div class="p-6">
                                <h3 class="font-extrabold text-gray-900 text-lg leading-tight truncate">${p.Nombre}</h3>
                                <p class="text-xs text-gray-400 font-medium mb-4">${p.Origen || '-'}</p>
                                <div class="flex justify-between items-center pt-4 border-t border-gray-100">
                                    <span class="text-[10px] font-bold px-2 py-1 rounded ${isAgotado ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-700'} uppercase">${isAgotado ? 'Agotado' : nro + ' Sacos'}</span>
                                    <span class="font-black text-xl text-gray-900">$${Number(p.Precio).toLocaleString('es-CL')}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { document.getElementById('loading').innerText = 'Error de conexión.'; }
        }

        function verDetalle(index) {
            currentProduct = productosGlobal[index];
            currentQty = 1;
            selectedFormat = 'Saco';
            
            document.getElementById('input-qty').value = 1;
            updateUIPrices();

            document.getElementById('vista-principal').classList.add('hidden');
            document.getElementById('vista-detalle').classList.remove('hidden');
            window.scrollTo(0, 0);

            document.getElementById('detalle-img').src = currentProduct.Imagen || '';
            document.getElementById('detalle-nombre').innerText = currentProduct.Nombre;
            document.getElementById('detalle-origen-texto').innerText = currentProduct.Origen;
            
            const cat = document.getElementById('detalle-categoria');
            cat.innerText = currentProduct.Categoria || 'CAFÉ VERDE';
            cat.className = `text-[10px] font-extrabold px-3 py-1.5 rounded-full uppercase tracking-widest ${currentProduct.Categoria.toLowerCase().includes('micro') ? 'bg-yellow-500' : 'bg-green-900'}`;

            // Ficha Técnica
            const omitir = ['Nombre','Categoria','Stock','Precio','Imagen','Notas de Cata','Acidez','Cuerpo','Dulzor','Sabor','Balance','Puntaje','Logo Productor'];
            document.getElementById('detalle-ficha').innerHTML = Object.keys(currentProduct).filter(k => !omitir.includes(k) && currentProduct[k]).map(k => `
                <div class="flex justify-between border-b border-gray-100 pb-1"><strong>${k}</strong><span>${currentProduct[k]}</span></div>
            `).join('');

            // Píldoras de sabor
            const notas = currentProduct['Notas de Cata'] || '';
            document.getElementById('contenedor-pildoras-sabor').innerHTML = notas.split(',').map(n => `
                <span class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-xs font-bold border border-gray-200">☕ ${n.trim()}</span>
            `).join('');

            dibujarGrafico(currentProduct);
        }

        function setFormato(fmt) {
            selectedFormat = fmt;
            const b1 = document.getElementById('btn-format-1kg');
            const bs = document.getElementById('btn-format-saco');
            
            if(fmt === '1kg') {
                b1.className = 'py-3 px-4 rounded-lg border-2 font-bold text-sm transition border-green-600 bg-green-50 text-green-900';
                bs.className = 'py-3 px-4 rounded-lg border-2 font-bold text-sm transition bg-white border-gray-200 text-gray-600';
            } else {
                bs.className = 'py-3 px-4 rounded-lg border-2 font-bold text-sm transition border-green-600 bg-green-50 text-green-900';
                b1.className = 'py-3 px-4 rounded-lg border-2 font-bold text-sm transition bg-white border-gray-200 text-gray-600';
            }
            updateUIPrices();
        }

        function changeQty(val) {
            currentQty = Math.max(1, currentQty + val);
            document.getElementById('input-qty').value = currentQty;
            updateUIPrices();
        }

        function updateUIPrices() {
            if(!currentProduct) return;
            const precioBase = Number(currentProduct.Precio);
            
            // Si es saco, multiplicamos por un estándar (ej: 30kg) o simplemente por cantidad si el precio es por saco.
            // Según tu PDF, el precio suele ser por KG. Asumiremos que el botón 'Saco' vende el peso del saco.
            // Extraemos el peso del empaque si existe (ej: '30kg' -> 30)
            let factorPeso = 1;
            if(selectedFormat === 'Saco') {
                const empaqueTxt = currentProduct.Empaque || '30kg';
                const match = empaqueTxt.match(/\d+/);
                factorPeso = match ? parseInt(match[0]) : 30;
            }

            const subtotal = precioBase * factorPeso * currentQty;
            const totalMP = Math.round(subtotal * 1.035);

            document.getElementById('txt-precio-fintoc').innerText = subtotal.toLocaleString('es-CL');
            document.getElementById('txt-precio-mp').innerText = totalMP.toLocaleString('es-CL');

            const wsp = "https://wa.me/56975552708?text=";
            const msgBase = `Hola Super Tasters! Quiero comprar:\n- Lote: ${currentProduct.Nombre}\n- Formato: ${selectedFormat}\n- Cantidad: ${currentQty}\n- Pago: `;
            
            document.getElementById('btn-pago-fintoc').onclick = () => window.open(wsp + encodeURIComponent(msgBase + "Transferencia/Fintoc"), '_blank');
            document.getElementById('btn-pago-mp').onclick = () => window.open(wsp + encodeURIComponent(msgBase + "Mercado Pago"), '_blank');
        }

        function dibujarGrafico(p) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if(radarInstancia) radarInstancia.destroy();
            radarInstancia = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Acidez', 'Cuerpo', 'Dulzor', 'Sabor', 'Balance'],
                    datasets: [{
                        data: [p.Acidez||8, p.Cuerpo||8, p.Dulzor||8, p.Sabor||8, p.Balance||8],
                        backgroundColor: 'rgba(20, 83, 45, 0.2)', borderColor: '#14532d', borderWidth: 2, pointBackgroundColor: '#14532d'
                    }]
                },
                options: { scales: { r: { min: 6, max: 10, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        function volverCatalogo() {
            document.getElementById('vista-detalle').classList.add('hidden');
            document.getElementById('vista-principal').classList.remove('hidden');
        }

        cargarCatalogo();
    </script>
</body>
</html>
